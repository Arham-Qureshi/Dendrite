<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dendrite</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="dn-header" id="header">

    <div class="dn-brand">
      <h1 class="dn-title">DENDRITE</h1>
      <div class="dn-brand-actions">
        <button class="dn-header-refresh" id="refresh-btn" title="Re-sync current chat" aria-label="Refresh chat index">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="square">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
        <span class="dn-platform-badge" id="platform-badge">—</span>
      </div>
    </div>

    <div class="dn-stats" id="stats-row">
      <div class="dn-stat">
        <div class="dn-stat-value" id="stat-questions">0</div>
        <div class="dn-stat-label">Questions</div>
      </div>
      <div class="dn-stat">
        <div class="dn-stat-value" id="stat-code">0</div>
        <div class="dn-stat-label">Code</div>
      </div>
      <div class="dn-stat">
        <div class="dn-stat-value" id="stat-links">0</div>
        <div class="dn-stat-label">Links</div>
      </div>
    </div>

    <nav class="dn-filters" id="filter-bar" role="tablist" aria-label="Content filter">
      <button class="dn-filter-btn active" data-filter="questions" role="tab" aria-selected="true"
        id="filter-questions">
        <span class="dn-filter-icon" aria-hidden="true">Q.</span>
        Questions
      </button>
      <button class="dn-filter-btn" data-filter="code" role="tab" aria-selected="false" id="filter-code">
        <span class="dn-filter-icon" aria-hidden="true">&lt;/&gt;</span>
        Code
      </button>
      <button class="dn-filter-btn" data-filter="links" role="tab" aria-selected="false" id="filter-links">
        <span class="dn-filter-icon" aria-hidden="true">→</span>
        Links
      </button>
    </nav>

    <div class="dn-search-wrap">
      <span class="dn-search-icon" aria-hidden="true">⌕</span>
      <input class="dn-search" type="search" id="search-input" placeholder="Search..." autocomplete="off"
        spellcheck="false" aria-label="Search sidebar">
    </div>

  </header>

  <main class="dn-list" id="node-list" role="tabpanel">
  </main>

  <footer class="dn-footer">
    <div class="dn-footer-text">
      Dendrite v1.0 ·
      <a href="https://github.com/Arham-Qureshi/Dentrite" target="_blank" rel="noopener noreferrer">Source</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>

</html>
