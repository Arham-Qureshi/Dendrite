<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dendrite</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="map.css">
</head>

<body>

  <header class="dn-header" id="header">

    <div class="dn-brand">
      <h1 class="dn-title">DENDRITE</h1>
      <div class="dn-brand-actions">
        <button class="dn-header-refresh" id="refresh-btn" title="Re-sync current chat" aria-label="Refresh chat index">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="square">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
        <span class="dn-platform-badge" id="platform-badge">—</span>
      </div>
    </div>

    <nav class="dn-filters" id="filter-bar" role="tablist" aria-label="Content filter">
      <button class="dn-filter-btn active" data-filter="questions" role="tab" aria-selected="true" id="filter-questions">
        <span class="dn-filter-count" id="stat-questions">0</span>
        <span class="dn-filter-label">Questions</span>
      </button>
      <button class="dn-filter-btn" data-filter="code" role="tab" aria-selected="false" id="filter-code">
        <span class="dn-filter-count" id="stat-code">0</span>
        <span class="dn-filter-label">Code</span>
      </button>
      <button class="dn-filter-btn" data-filter="map" role="tab" aria-selected="false" id="filter-map">
        <span class="dn-filter-count" id="stat-map">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="square">
            <path d="M12 3v6M12 9L7 16M12 9l5 7M7 16l3 5M17 16l-3 5" />
          </svg>
        </span>
        <span class="dn-filter-label">Map</span>
      </button>
      <div class="dn-dropdown" id="more-dropdown">
        <button class="dn-filter-btn dn-dropdown-toggle" id="more-toggle" aria-haspopup="true" aria-expanded="false">
          <span class="dn-filter-count">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="square">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
          <span class="dn-filter-label">More</span>
        </button>
        <div class="dn-dropdown-menu" id="more-menu">
          <button class="dn-dropdown-item" data-filter="links" role="tab" aria-selected="false" id="filter-links">
            <span class="dn-dropdown-item-icon">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="square">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
            </span>
            <span class="dn-dropdown-item-label">Links</span>
            <span class="dn-dropdown-item-count" id="stat-links">0</span>
          </button>
          <button class="dn-dropdown-item" data-filter="artifacts" role="tab" aria-selected="false" id="filter-artifacts">
            <span class="dn-dropdown-item-icon">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="square">
                <rect x="3" y="3" width="18" height="18" rx="0" ry="0"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </span>
            <span class="dn-dropdown-item-label">Artifacts</span>
            <span class="dn-dropdown-item-count" id="stat-artifacts">0</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="dn-search-wrap">
      <span class="dn-search-icon" aria-hidden="true">⌕</span>
      <input class="dn-search" type="search" id="search-input" placeholder="Search..." autocomplete="off"
        spellcheck="false" aria-label="Search sidebar">
    </div>

  </header>

  <main class="dn-list" id="node-list" role="tabpanel">
  </main>

  <div class="dn-map-viewport" id="map-viewport" role="tabpanel" aria-label="Logic map">
  </div>

  <div class="dn-map-tooltip" id="map-tooltip"></div>

  <div class="dn-map-legend" id="map-legend" style="display:none;">
    <div class="dn-map-legend-item">
      <span class="dn-map-legend-dot root"></span> Root
    </div>
    <div class="dn-map-legend-item">
      <span class="dn-map-legend-dot"></span> Follow-up
    </div>
    <div class="dn-map-legend-item">
      <span class="dn-map-legend-line"></span> Edge
    </div>
  </div>

  <footer class="dn-footer">
    <div class="dn-footer-text">
      Dendrite v1.0 ·
      <a href="https://github.com/Arham-Qureshi/Dentrite" target="_blank" rel="noopener noreferrer">Source</a>
    </div>
  </footer>

  <script src="tree_engine.js"></script>
  <script src="map.js"></script>
  <script src="app.js"></script>
</body>

</html>
